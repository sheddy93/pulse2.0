<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseHR Design System - Presentation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/theme/black.css">
    <style>
        :root {
            --r-background-color: #0F172A;
            --r-main-color: #F8FAFC;
            --r-heading-color: #FFFFFF;
            --r-link-color: #3B82F6;
            --r-link-color-hover: #60A5FA;
        }

        .reveal {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        .reveal .slides {
            text-align: center;
        }

        .reveal .slide-background {
            background-color: #0F172A;
        }

        .reveal section img {
            border: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            max-height: 85vh;
            margin: 0 auto;
            display: block;
        }

        .reveal h1 {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 0.5em;
            text-transform: none;
        }

        .reveal h2 {
            font-size: 2em;
            font-weight: 600;
            margin-bottom: 1em;
            text-transform: none;
        }

        .reveal p {
            font-size: 1.2em;
            line-height: 1.6;
        }

        /* Progress bar */
        .reveal .progress {
            background: rgba(59, 130, 246, 0.2);
            height: 4px;
        }

        .reveal .progress span {
            background: #3B82F6;
        }

        /* Controls */
        .reveal .controls {
            color: #3B82F6;
        }

        /* Slide number */
        .reveal .slide-number {
            background-color: rgba(59, 130, 246, 0.3);
            color: #FFFFFF;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
        }

        /* Navigation hints */
        .reveal .navigate-left,
        .reveal .navigate-right,
        .reveal .navigate-up,
        .reveal .navigate-down {
            color: #3B82F6;
        }

        /* Custom slide content */
        .slide-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 2em;
        }

        /* Fullscreen image slides */
        .fullscreen-slide {
            padding: 0 !important;
        }

        .fullscreen-slide img {
            width: 100%;
            height: 100vh;
            object-fit: contain;
            box-shadow: none;
        }

        /* Keyboard shortcuts hint */
        .shortcuts-hint {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: rgba(30, 41, 59, 0.9);
            color: #94A3B8;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.8em;
            z-index: 100;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .shortcuts-hint:hover {
            opacity: 1;
        }

        .shortcuts-hint kbd {
            background: #0F172A;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 2px;
        }

        @media print {
            .shortcuts-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <!-- Slide 1: Cover -->
            <section class="fullscreen-slide">
                <img src="slides/slide-01-cover.png" alt="PulseHR Design System Cover">
            </section>

            <!-- Slide 2: Design Philosophy -->
            <section class="fullscreen-slide">
                <img src="slides/slide-02-philosophy.png" alt="Design Philosophy - Hybrid Enterprise Approach">
            </section>

            <!-- Slide 3: Layout System -->
            <section class="fullscreen-slide">
                <img src="slides/slide-03-layout.png" alt="Layout System Architecture">
            </section>

            <!-- Slide 4: Bento Dashboard -->
            <section class="fullscreen-slide">
                <img src="slides/slide-04-dashboard.png" alt="Bento Grid Dashboard System">
            </section>

            <!-- Slide 5: Component System -->
            <section class="fullscreen-slide">
                <img src="slides/slide-05-components.png" alt="Core Component Library">
            </section>

            <!-- Slide 6: Role-Based UX -->
            <section class="fullscreen-slide">
                <img src="slides/slide-06-roles.png" alt="Role-Based User Experience">
            </section>

            <!-- Slide 7: Tables & Forms -->
            <section class="fullscreen-slide">
                <img src="slides/slide-07-tables-forms.png" alt="Data Tables & Forms Pattern">
            </section>

            <!-- Slide 8: Dark/Light Theme -->
            <section class="fullscreen-slide">
                <img src="slides/slide-08-themes.png" alt="Theme System - Dark& Light Mode">
            </section>

            <!-- Slide 9: Responsive Design -->
            <section class="fullscreen-slide">
                <img src="slides/slide-09-responsive.png" alt="Responsive Adaptation Strategy">
            </section>

            <!-- Slide 10: Implementation Roadmap -->
            <section class="fullscreen-slide">
                <img src="slides/slide-10-roadmap.png" alt="Design System Implementation Roadmap">
            </section>
        </div>
    </div>

    <!-- Keyboard shortcuts hint -->
    <div class="shortcuts-hint">
        Navigation: <kbd>←</kbd> <kbd>→</kbd> arrows | <kbd>F</kbd> fullscreen | <kbd>Esc</kbd> overview
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.4/dist/reveal.js"></script>
    <script>
        // Initialize Reveal.js
        Reveal.initialize({
            // Display presentation control arrows
            controls: true,
            
            // Help the user learn the controls
            controlsTutorial: true,
            
            // Display a presentation progress bar
            progress: true,
            
            // Display the page number of the current slide
            slideNumber: 'c/t',
            
            // Add the current slide number to the URL hash
            hash: true,
            
            // Push each slide change to the browser history
            history: true,
            
            // Enable keyboard shortcuts for navigation
            keyboard: true,
            
            // Enable the slide overview mode
            overview: true,
            
            // Center slides on the screen
            center: true,
            
            // Enables touch navigation on devices with touch input
            touch: true,
            
            // Loop the presentation
            loop: false,
            
            // Change the presentation direction to be RTL
            rtl: false,
            
            // Randomize slide order
            shuffle: false,
            
            // Turns fragments on/off globally
            fragments: true,
            
            // Flags whether to include the current fragment in the URL
            fragmentInURL: true,
            
            // Flags if the presentation is running in an embedded mode
            embedded: false,
            
            // Flags if we should show a help overlay when ? is pressed
            help: true,
            
            // Number of milliseconds between automatically proceeding to next slide
            autoSlide: 0,
            
            // Stop auto-sliding after user input
            autoSlideStoppable: true,
            
            // Enable slide navigation via mouse wheel
            mouseWheel: false,
            
            // Hide cursor if inactive
            hideInactiveCursor: true,
            
            // Time before cursor is hidden (in ms)
            hideCursorTime: 5000,
            
            // Hides the address bar on mobile devices
            hideAddressBar: true,
            
            // Opens links in an iframe preview overlay
            previewLinks: false,
            
            // Transition style
            transition: 'slide', // none/fade/slide/convex/concave/zoom
            
            // Transition speed
            transitionSpeed: 'default', // default/fast/slow
            
            // Transition style for full page slide backgrounds
            backgroundTransition: 'fade', // none/fade/slide/convex/concave/zoom
            
            // Number of slides away from the current that are visible
            viewDistance: 3,
            
            // Number of slides away from the current that are visible on mobile
            mobileViewDistance: 2,
            
            // Parallax background image
            parallaxBackgroundImage: '',
            
            // Parallax background size
            parallaxBackgroundSize: '',
            
            // PDF export options
            pdfMaxPagesPerSlide: 1,
            pdfSeparateFragments: false,
        });

        // Custom keyboard shortcuts
        Reveal.addKeyBinding({ keyCode: 70, key: 'F', description: 'Toggle fullscreen' }, () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Auto-hide shortcuts hint after 10 seconds
        setTimeout(() => {
            const hint = document.querySelector('.shortcuts-hint');
            if (hint) {
                hint.style.transition = 'opacity 1s';
                hint.style.opacity = '0';
            }
        }, 10000);

        // Show shortcuts hint on mouse move
        document.addEventListener('mousemove', () => {
            const hint = document.querySelector('.shortcuts-hint');
            if (hint && hint.style.opacity === '0') {
                hint.style.opacity = '0.7';
            }
        });
    </script>
</body>
</html>
