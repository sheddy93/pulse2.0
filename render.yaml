# ============================================================
# PulseHR - Render Blueprint Configuration
# ============================================================
# Deploy backend and PostgreSQL database to Render
#
# Usage:
#   1. Create new Blueprint in Render dashboard
#   2. Connect this repo
#   3. Render will auto-detect this file
#   4. Add environment variables in Render dashboard
#
# Reference: https://render.com/docs/blueprint-spec
# ============================================================

services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  - type: postgres
    name: pulsehr-postgres
    databaseName: pulsehr
    user: pulsehr
    ipAllowList: []

  # ============================================================
  # Django Backend Web Service
  # ============================================================
  - type: web
    name: pulsehr-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /api/auth/me/
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: DJANGO_ALLOWED_HOSTS
        sync: false  # Set to your Render backend URL
      - key: DATABASE_URL
        fromDatabase:
          name: pulsehr-postgres
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your Vercel frontend URL
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Set to your Vercel frontend URL
      - key: FRONTEND_URL
        sync: false  # Set to your Vercel frontend URL
      - key: AI_ENABLED
        value: false
      - key: SENTRY_DSN
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false