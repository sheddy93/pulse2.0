version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aldevion_hr_db
    environment:
      POSTGRES_USER: aldevion
      POSTGRES_PASSWORD: aldevion_password
      POSTGRES_DB: aldevion_hr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aldevion"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: aldevion_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: aldevion_network