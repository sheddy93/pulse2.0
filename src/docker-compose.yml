version: '3.8'

services:
  # PulseHR Application
  app:
    build: .
    ports:
      - "80:5173"
    environment:
      NODE_ENV: production
      VITE_API_URL: http://localhost:3000
    depends_on:
      - db
    networks:
      - pulsehr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pulsehr_prod
      POSTGRES_USER: pulsehr
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pulsehr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsehr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - pulsehr-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:

networks:
  pulsehr-network:
    driver: bridge